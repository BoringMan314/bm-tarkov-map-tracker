<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>塔科夫地圖追蹤</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="map-viewport" class="map-viewport">
    <div id="map-stage" class="map-stage">
      <div id="map-content" class="map-content">
        <div id="map-inline" class="map-inline hidden" aria-hidden="true"></div>
        <div id="map-tiles" class="map-tiles hidden" aria-hidden="true"></div>
        <img id="map-image" class="map-image hidden" alt="" draggable="false" />
        <div id="map-exfil-overlay" class="map-exfil-overlay" aria-hidden="false"></div>
        <div id="map-player-overlay" class="map-player-overlay" aria-hidden="false"></div>
      </div>
    </div>
  </div>

  <div class="widget-wrapper" id="map-toolbar">
    <div class="controls-stack">
      <div class="select-container" id="lang-select">
        <button type="button" class="toolbar-btn select-field lang-select-field" id="lang-select-btn" aria-haspopup="listbox" aria-expanded="false">
          <span id="lang-select-label">繁體中文</span>
          <span class="select-caret" aria-hidden="true">▼</span>
        </button>
        <div class="dropdown-list dropdown-list-scroll hidden" id="lang-dropdown" role="listbox"></div>
      </div>
      <button type="button" class="toolbar-btn select-field point-source-btn" id="point-source-btn">
        <span id="point-source-label">tarkov.dev</span>
      </button>
      <div class="select-container" id="map-select">
        <button type="button" class="toolbar-btn select-field" id="map-select-btn" aria-haspopup="listbox" aria-expanded="false">
          SELECT MAP
          <span class="select-caret" aria-hidden="true">▼</span>
        </button>
        <div class="dropdown-list hidden" id="map-dropdown" role="listbox"></div>
      </div>
      <div class="select-container" id="points-select">
        <button type="button" class="toolbar-btn select-field" id="points-select-btn" aria-haspopup="true" aria-expanded="false">
          <span id="points-select-label">點位</span>
          <span class="select-caret" aria-hidden="true">▼</span>
        </button>
        <div class="dropdown-list points-panel hidden" id="points-panel">
          <div class="exfil-filters" id="exfil-filters">
            <label class="exfil-filter-row exfil-filter-master">
              <span class="exfil-filter-label" id="exfil-filter-group-label">撤離點</span>
              <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-group" checked />
            </label>
            <label class="exfil-filter-row">
              <span class="exfil-filter-label" id="exfil-filter-pmc-names-label">撤離點名稱</span>
              <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-pmc-names" checked />
            </label>
            <label class="exfil-filter-row">
              <span class="exfil-filter-label" id="exfil-filter-show-coords-label">顯示座標</span>
              <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-show-coords" />
            </label>
            <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-player-row">
              <span class="exfil-filter-label-wrap">
                <img class="exfil-filter-icon" src="/api/points/icons/player.png" alt="" width="16" height="16" draggable="false" />
                <span class="exfil-filter-label" id="exfil-filter-player-label">玩家位置</span>
              </span>
              <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-player" checked />
            </label>
            <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-player-lock-row">
              <span class="exfil-filter-label-wrap">
                <span class="exfil-filter-icon-spacer" aria-hidden="true"></span>
                <span class="exfil-filter-label" id="exfil-filter-player-lock-label">玩家中心鎖定</span>
              </span>
              <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-player-lock" />
            </label>
            <div class="exfil-filter-subrows">
              <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-pmc-row">
                <span class="exfil-filter-label-wrap">
                  <img class="exfil-filter-icon" src="/api/points/icons/exfil-pmc.png" alt="" width="16" height="16" draggable="false" />
                  <span class="exfil-filter-label" id="exfil-filter-pmc-label">PMC</span>
                </span>
                <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-pmc" data-exfil="pmc" checked />
              </label>
              <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-scav-row">
                <span class="exfil-filter-label-wrap">
                  <img class="exfil-filter-icon" src="/api/points/icons/exfil-scav.png" alt="" width="16" height="16" draggable="false" />
                  <span class="exfil-filter-label" id="exfil-filter-scav-label">Scav</span>
                </span>
                <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-scav" data-exfil="scav" checked />
              </label>
              <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-coop-row">
                <span class="exfil-filter-label-wrap">
                  <img class="exfil-filter-icon" src="/api/points/icons/exfil-coop.png" alt="" width="16" height="16" draggable="false" />
                  <span class="exfil-filter-label" id="exfil-filter-coop-label">共用撤離點</span>
                </span>
                <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-coop" data-exfil="coop" checked />
              </label>
              <label class="exfil-filter-row exfil-filter-sub" id="exfil-filter-transit-row">
                <span class="exfil-filter-label-wrap">
                  <img class="exfil-filter-icon" src="/api/points/icons/exfil-transit.png" alt="" width="16" height="16" draggable="false" />
                  <span class="exfil-filter-label" id="exfil-filter-transit-label">轉移點</span>
                </span>
                <input type="checkbox" class="exfil-filter-checkbox" id="exfil-filter-transit" data-exfil="transit" checked />
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="select-container" id="embedded-select">
        <button type="button" class="toolbar-btn select-field" id="embedded-select-btn" aria-haspopup="true" aria-expanded="false">
          <span id="embedded-select-label">內嵌地圖</span>
          <span class="select-caret" aria-hidden="true">▼</span>
        </button>
        <div class="dropdown-list embedded-panel hidden" id="embedded-panel">
          <div class="exfil-filter-row embedded-status-row">
            <span class="exfil-filter-label" id="embedded-display-target-label">顯示於</span>
            <span class="embedded-status-value" id="embedded-display-target-value">—</span>
          </div>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-position-label">位置</span>
            <select id="embedded-position" class="embedded-select">
              <option value="none">無</option>
              <option value="top-left">左上</option>
              <option value="top-right">右上</option>
              <option value="bottom-left">左下</option>
              <option value="bottom-right">右下</option>
            </select>
          </label>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-range-label">顯示範圍</span>
            <select id="embedded-range" class="embedded-select">
              <option value="1">1X</option>
              <option value="5">5X</option>
              <option value="10" selected>10X</option>
              <option value="15">15X</option>
              <option value="20">20X</option>
            </select>
          </label>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-size-label">顯示尺寸</span>
            <select id="embedded-size" class="embedded-select">
              <option value="100">100×100</option>
              <option value="200">200×200</option>
              <option value="300" selected>300×300</option>
            </select>
          </label>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-offset-x-label">偏移 X</span>
            <select id="embedded-offset-x" class="embedded-select">
              <option value="0">0</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="150">150</option>
              <option value="200">200</option>
              <option value="250" selected>250</option>
              <option value="300">300</option>
              <option value="350">350</option>
              <option value="400">400</option>
              <option value="450">450</option>
              <option value="500">500</option>
            </select>
          </label>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-offset-y-label">偏移 Y</span>
            <select id="embedded-offset-y" class="embedded-select">
              <option value="0" selected>0</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="150">150</option>
              <option value="200">200</option>
              <option value="250">250</option>
              <option value="300">300</option>
              <option value="350">350</option>
              <option value="400">400</option>
              <option value="450">450</option>
              <option value="500">500</option>
            </select>
          </label>
          <label class="exfil-filter-row embedded-option-row">
            <span class="exfil-filter-label" id="embedded-opacity-label">透明度</span>
            <select id="embedded-opacity" class="embedded-select">
              <option value="0">0%</option>
              <option value="30">30%</option>
              <option value="50" selected>50%</option>
              <option value="80">80%</option>
            </select>
          </label>
        </div>
      </div>
      <button type="button" class="toolbar-btn action-btn" id="reset-view-btn">
        <svg class="btn-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        <span class="btn-label" id="reset-view-label">RESET VIEW</span>
      </button>
      <div class="mouse-coords" id="mouse-coords" aria-live="polite">
        <span class="mouse-coords-item"><span class="mouse-coords-label">X:</span> <span id="mouse-coord-x">—</span></span>
        <span class="mouse-coords-item"><span class="mouse-coords-label">Y:</span> <span id="mouse-coord-y">—</span></span>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
